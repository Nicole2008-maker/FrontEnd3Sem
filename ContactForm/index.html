<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">

</head>

<body>

    <header class="header">
        <div class="container container--flex-column">
            <img class="header__logo" src="./images/Logotipo.svg" alt="">

            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">

                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>
                    <div class="contact-form__col-b">



                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome"
                            placeholder="Nome" type="text">
                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">

                        <label class="contact-form__label" for="E-mail">E-mail</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--enorme" name="E-mail" id="E-mail"
                            type="E-mail" placeholder="E-mail">

                    </div>




                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">

                        <label class="contact-form__label" for="Telefone">Telefone</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tres" name="Telefone" id="Telefone"
                            type="Telefone" placeholder="+55">
                        <input class="contact-form__input contact-form__input--tres" name="Telefone" id="Telefone"
                            type="Telefone" placeholder="ddd">
                        <input class="contact-form__input contact-form__input--tres" name="Telefone" id="Telefone"
                            type="Telefone" placeholder="ex: 99999-9999">

                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">

                        <label class="contact-form__label" for="Endereço">Endereço</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--dois" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="cep:9999-999">
                        <input class="contact-form__input contact-form__input--metade" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="Rua Lá De Casa">
                        <input class="contact-form__input contact-form__input--tres" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="ex: 555">
                    </div>

                    </div>

                    <div class="contact-form__linha">
                    <div class="contact-form__col-a">

                       
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tres" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="Apto. 12 Bloco X">
                        <input class="contact-form__input contact-form__input--tres" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="Bairro">
                        <input class="contact-form__input contact-form__input--tres" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="Cidade">
                            </div>
                            </div>

                            
                        <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--tres" name="Endereço" id="Endereço"
                            type="Endereço" placeholder="Estado">    


            </form>
        </div>
    </main>
</body>

</html>
